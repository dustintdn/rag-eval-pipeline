services:
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./eval_logs:/app/eval_logs
      - ./eval:/app/eval
      - ./docs:/app/docs

  ui:
    build: .
    command: streamlit run ui/app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./eval_logs:/app/eval_logs
      - ./eval:/app/eval
      - ./docs:/app/docs
    depends_on:
      - api
